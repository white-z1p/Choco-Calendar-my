<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="초코 다이어리">

<meta name="theme-color" content="#8B5E3C">

<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="manifest" href="manifest.json">

<title>초코 달력</title>
<style>
  :root {
    --brown: #8B5E3C;
    --brown-light: #C97B3C;
    --brown-pale: #D4A574;
    --bg: #F5F0EB;
    --bg-card: #FFFFFF;
    --bg-sub: #F0EAE3;
    --text: #2C1A0E;
    --text-sec: #7A5C44;
    --text-hint: #B09070;
    --border: rgba(139,94,60,0.15);
    --border-med: rgba(139,94,60,0.25);
    --radius: 14px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1008;
      --bg-card: #2A1A0E;
      --bg-sub: #221408;
      --text: #F5EDE0;
      --text-sec: #C4A882;
      --text-hint: #7A6040;
      --border: rgba(212,165,116,0.15);
      --border-med: rgba(212,165,116,0.25);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  #app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100dvh;
    background: var(--bg);
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }

  /* ── Header ── */
  .header {
    background: var(--brown);
    padding: 16px 20px 14px;
    padding-top: calc(16px + env(safe-area-inset-top, 0px));
    display: flex;
    align-items: center;
    gap: 13px;
  }
  .dog-circle {
    background: white;
    width: 46px; height: 46px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    flex-shrink: 0;
  }
  .header h1 { color: white; font-size: 1.25rem; font-weight: 600; }
  .header p { color: rgba(255,255,255,0.78); font-size: 0.78rem; margin-top: 2px; }

  /* ── Month Nav ── */
  .month-nav {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; padding: 16px 20px 8px;
  }
  .mnav-btn {
    background: var(--bg-card);
    border: 0.5px solid var(--border-med);
    border-radius: 50%;
    width: 38px; height: 38px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-sec);
    font-size: 18px;
    transition: background 0.1s;
  }
  .mnav-btn:active { background: var(--bg-sub); transform: scale(0.95); }
  .month-title {
    font-size: 1.05rem; font-weight: 600;
    color: var(--text);
    min-width: 110px; text-align: center;
  }

  /* ── Calendar ── */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    padding: 0 12px;
  }
  .dh {
    text-align: center;
    font-size: 0.7rem; font-weight: 600;
    color: var(--text-hint);
    padding: 6px 2px 4px;
    letter-spacing: 0.02em;
  }
  .sun-h { color: #C0392B; }
  .sat-h { color: #2471A3; }

  .dc {
    aspect-ratio: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border-radius: 10px;
    cursor: pointer;
    gap: 3px;
    min-height: 44px;
    transition: background 0.1s;
    position: relative;
  }
  .dc:active:not(.empty) { background: var(--bg-sub); transform: scale(0.92); }
  .dc.today { background: var(--brown); }
  .dc.today .dn { color: white !important; font-weight: 700; }
  .dc.selected { background: var(--brown-pale); }
  .dc.selected .dn { color: white !important; }

  .dn {
    font-size: 0.88rem; font-weight: 400;
    color: var(--text); line-height: 1;
  }
  .dn.sun { color: #C0392B; }
  .dn.sat { color: #2471A3; }

  .dots { display: flex; gap: 2px; justify-content: center; }
  .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--brown-light); }

  /* ── Divider ── */
  .divider {
    text-align: center;
    color: var(--brown-pale);
    font-size: 0.6rem; letter-spacing: 4px;
    padding: 12px 0 10px;
  }

  /* ── Panel ── */
  .panel {
    margin: 0 12px;
    border-radius: var(--radius);
    overflow: hidden;
    border: 0.5px solid var(--border);
    background: var(--bg-card);
  }
  .panel-header {
    background: var(--bg-sub);
    padding: 13px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 0.5px solid var(--border);
  }
  .panel-date { font-size: 0.95rem; font-weight: 600; color: var(--text); }
  .close-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-hint);
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .close-btn:active { background: var(--border); }

  /* ── Weather ── */
  .wx-strip {
    padding: 13px 16px;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
    display: flex; align-items: center; gap: 10px;
  }
  .wx-strip:active { background: var(--bg-sub); }
  .wx-icon { font-size: 1.5rem; }
  .wx-temp { font-size: 0.9rem; font-weight: 500; color: var(--text); }
  .wx-hint { font-size: 0.72rem; color: var(--text-hint); margin-top: 1px; }
  .suit-badge {
    font-size: 0.7rem; font-weight: 600;
    padding: 4px 9px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
  }
  .suit-perfect { background: #D4EDDA; color: #155724; }
  .suit-hot { background: #FFF3CD; color: #856404; }
  .suit-cold { background: #CCE5FF; color: #004085; }
  .suit-rainy { background: #E2E3E5; color: #383D41; }

  .wx-detail {
    background: var(--bg-sub);
    padding: 13px 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .wx-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 10px; }
  .wx-metric {
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    padding: 9px 4px; text-align: center;
    border: 0.5px solid var(--border);
  }
  .wx-ml { font-size: 0.68rem; color: var(--text-hint); }
  .wx-mv { font-size: 0.9rem; font-weight: 600; color: var(--text); margin-top: 3px; }
  .wx-advice { font-size: 0.8rem; color: var(--text-sec); margin-bottom: 8px; line-height: 1.6; }

  /* ── Timeline ── */
  .tl-ev {
    display: flex; align-items: flex-start;
    gap: 10px; padding: 13px 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .tl-ev:last-child { border-bottom: none; }
  .tl-time { font-size: 0.75rem; color: var(--text-hint); min-width: 38px; padding-top: 3px; }
  .tl-content { flex: 1; }
  .tl-name { font-size: 0.92rem; font-weight: 500; color: var(--text); }
  .tl-memo { font-size: 0.78rem; color: var(--text-sec); margin-top: 2px; }
  .tl-btns { display: flex; gap: 5px; align-self: center; flex-shrink: 0; }
  .tl-del, .tl-edit {
    background: none;
    border: 0.5px solid var(--border-med);
    cursor: pointer;
    color: var(--text-hint);
    font-size: 0.72rem;
    padding: 6px 10px;
    border-radius: 6px;
    min-height: 34px;
    font-family: inherit;
  }
  .tl-del:active { background: #FDECEA; border-color: #E74C3C; color: #C0392B; }
  .tl-edit:active { background: #EAF3FE; border-color: #3498DB; color: #1A6FAB; }

  /* ── Walk/Poop tracker ── */
  .care-tracker {
    background: var(--bg-sub);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    margin-bottom: 7px;
    overflow: hidden;
  }
  .care-tracker-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
  }
  .walk-label { font-size: 0.82rem; color: var(--text-sec); flex: 1; }
  .tracker-count-badge {
    font-size: 0.78rem; font-weight: 700; color: var(--brown);
    background: var(--bg-card);
    border: 0.5px solid var(--border-med);
    border-radius: 12px;
    padding: 2px 9px;
    min-width: 36px; text-align: center;
  }
  .tracker-add-btn {
    background: var(--brown);
    border: none; border-radius: 8px;
    width: 30px; height: 30px;
    font-size: 1.2rem; line-height: 1;
    cursor: pointer; color: white;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit; flex-shrink: 0;
  }
  .tracker-add-btn:active { background: #7a5234; transform: scale(0.92); }
  .tracker-log {
    border-top: 0.5px solid var(--border);
    padding: 6px 10px 8px;
  }
  .tracker-log-item {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 4px;
    border-bottom: 0.5px solid var(--border);
  }
  .tracker-log-item:last-child { border-bottom: none; }
  .tracker-log-num {
    font-size: 0.7rem; color: var(--text-hint);
    min-width: 16px; text-align: center;
  }
  .tracker-log-times {
    flex: 1; font-size: 0.82rem; color: var(--text);
  }
  .tracker-log-del {
    background: none; border: none; cursor: pointer;
    color: var(--text-hint); font-size: 0.8rem;
    padding: 4px 6px; border-radius: 5px;
    font-family: inherit; line-height: 1;
  }
  .tracker-log-del:active { background: #FDECEA; color: #C0392B; }
  .tracker-log-edit {
    background: none; border: none; cursor: pointer;
    color: var(--text-hint); font-size: 0.8rem;
    padding: 4px 6px; border-radius: 5px;
    font-family: inherit; line-height: 1;
  }
  .tracker-log-edit:active { background: #EAF3FE; color: #1A6FAB; }

  /* ── Walk/Poop time input modal ── */
  .time-input-modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .time-input-modal {
    background: var(--bg-card);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0px));
    width: 100%; max-width: 430px;
  }
  .time-input-modal-title {
    font-size: 1rem; font-weight: 700; color: var(--text);
    margin-bottom: 16px;
  }
  .time-input-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .time-input-label {
    font-size: 0.82rem; color: var(--text-sec);
    min-width: 42px;
  }
  .time-input-field {
    flex: 1;
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm);
    padding: 11px 13px;
    font-size: 1rem; font-family: inherit;
    background: var(--bg-sub); color: var(--text);
    outline: none; min-height: 46px;
    -webkit-appearance: none; appearance: none;
  }
  .time-input-field:focus { border-color: var(--brown); }
  .time-input-hint {
    font-size: 0.72rem; color: var(--text-hint);
    margin-bottom: 16px; margin-top: -6px;
  }
  .time-input-btns { display: flex; gap: 8px; margin-top: 4px; }
  .time-input-save {
    background: var(--brown); color: white;
    border: none; border-radius: var(--radius-sm);
    padding: 12px 20px; font-size: 0.92rem; font-weight: 600;
    cursor: pointer; min-height: 48px; flex: 1; font-family: inherit;
  }
  .time-input-save:active { background: #7a5234; }
  .time-input-cancel {
    background: none; border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm); padding: 12px 16px;
    font-size: 0.92rem; cursor: pointer; color: var(--text-sec);
    min-height: 48px; font-family: inherit;
  }
  .time-input-cancel:active { background: var(--bg-sub); }

  /* walk-btn kept for potential reuse */
  .walk-btn {
    background: var(--bg-card);
    border: 0.5px solid var(--border-med);
    border-radius: 50%;
    width: 32px; height: 32px;
    font-size: 1.1rem; line-height: 1;
    cursor: pointer; color: var(--text);
    display: flex; align-items: center; justify-content: center;
    font-family: inherit;
  }
  .walk-btn:active { background: var(--bg-sub); transform: scale(0.92); }
  .walk-btn:disabled { opacity: 0.3; cursor: default; }
  .walk-plus { color: var(--brown); border-color: var(--brown-pale); }
  .care-section {
    border-top: 0.5px solid var(--border);
    padding: 12px 16px 14px;
  }
  .care-title {
    font-size: 0.75rem; font-weight: 600;
    color: var(--text-sec);
    margin-bottom: 10px;
    letter-spacing: 0.02em;
  }
  .care-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
  }
  .care-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-sub);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
    -webkit-user-select: none; user-select: none;
  }
  .care-item:active { transform: scale(0.96); }
  .care-item.checked {
    background: #E9F5EC;
    border-color: #4CAF50;
  }
  .care-item.checked .care-label { color: #2E7D32; font-weight: 600; }
  .care-item.checked .care-check { background: #4CAF50; border-color: #4CAF50; }
  .care-item.checked .care-check::after { content: '✓'; color: white; font-size: 0.7rem; line-height: 1; }
  @media (prefers-color-scheme: dark) {
    .care-item.checked { background: #1A3520; border-color: #4CAF50; }
    .care-item.checked .care-label { color: #81C784; }
  }
  .care-check {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid var(--border-med);
    background: var(--bg-card);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .care-emoji { font-size: 1rem; flex-shrink: 0; }
  .care-label { font-size: 0.82rem; color: var(--text-sec); }

  .empty-day {
    text-align: center;
    padding: 24px 16px;
    color: var(--text-hint);
    font-size: 0.88rem;
    line-height: 1.7;
  }

  /* ── Add form ── */
  .add-area { padding: 10px 14px; border-top: 0.5px solid var(--border); }
  .add-open-btn {
    width: 100%;
    background: none;
    border: 1.5px dashed var(--border-med);
    border-radius: 10px;
    padding: 12px;
    color: var(--text-sec);
    font-size: 0.9rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 7px;
    min-height: 48px;
    font-family: inherit;
  }
  .add-open-btn:active { background: var(--bg-sub); }

  .add-form {
    background: var(--bg-sub);
    border-radius: 10px;
    padding: 14px;
    border: 0.5px solid var(--border-med);
  }
  .add-form label {
    font-size: 0.78rem; font-weight: 500;
    color: var(--text-sec);
    display: block;
    margin-bottom: 5px; margin-top: 12px;
  }
  .add-form label:first-child { margin-top: 0; }
  .add-form input {
    width: 100%;
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 1rem;
    font-family: inherit;
    background: var(--bg-card);
    color: var(--text);
    outline: none;
    min-height: 48px;
    -webkit-appearance: none;
    appearance: none;
  }
  .add-form input:focus { border-color: var(--brown); }

  .add-row-btns { display: flex; gap: 8px; margin-top: 14px; }
  .btn-save {
    background: var(--brown); color: white;
    border: none; border-radius: var(--radius-sm);
    padding: 12px 20px;
    font-size: 0.92rem; font-weight: 600;
    cursor: pointer; min-height: 48px;
    flex: 1; font-family: inherit;
  }
  .btn-save:active { background: #7a5234; transform: scale(0.98); }
  .btn-cancel {
    background: none;
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 0.92rem;
    cursor: pointer; color: var(--text-sec);
    min-height: 48px; font-family: inherit;
  }
  .btn-cancel:active { background: var(--bg-card); }

  /* ── No selection ── */
  .no-sel {
    display: flex; flex-direction: column;
    align-items: center;
    padding: 2.5rem 1rem;
    text-align: center;
  }
  .no-sel .paw { font-size: 2.2rem; opacity: 0.2; }
  .no-sel p { color: var(--text-hint); font-size: 0.9rem; margin-top: 10px; line-height: 1.7; }

  /* ── SVG icons ── */
  .icon { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; vertical-align: middle; }

  /* ── Alert banner ── */
  .alert-banner {
    margin: 10px 12px 0;
    background: #FFF8E7;
    border: 1px solid #F5C842;
    border-radius: var(--radius);
    padding: 13px 16px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  @media (prefers-color-scheme: dark) {
    .alert-banner { background: #2A2000; border-color: #7A6000; }
    .alert-banner .alert-title { color: #FFD95A; }
    .alert-banner .alert-body { color: #C4A840; }
  }
  .alert-icon { font-size: 1.4rem; flex-shrink: 0; line-height: 1.3; }
  .alert-text { flex: 1; }
  .alert-title { font-size: 0.88rem; font-weight: 700; color: #7A5000; margin-bottom: 2px; }
  .alert-body  { font-size: 0.78rem; color: #9A7020; line-height: 1.5; }
  .alert-close {
    background: none; border: none; cursor: pointer;
    color: #B09040; font-size: 16px; padding: 0 0 0 6px; flex-shrink: 0;
    line-height: 1;
  }

  /* ── Settings button ── */
  .settings-btn {
    margin-left: auto;
    background: rgba(255,255,255,0.2);
    border: none; border-radius: 8px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: white; flex-shrink: 0;
  }
  .settings-btn:active { background: rgba(255,255,255,0.35); }

  /* ── Settings modal ── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .modal {
    background: var(--bg-card);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0px));
    width: 100%; max-width: 430px;
  }
  .modal-title {
    font-size: 1rem; font-weight: 700; color: var(--text);
    margin-bottom: 20px;
  }
  .modal-row {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .modal-row:last-of-type { border-bottom: none; }
  .modal-emoji { font-size: 1.3rem; width: 28px; text-align: center; flex-shrink: 0; }
  .modal-label { flex: 1; font-size: 0.92rem; color: var(--text); }
  .modal-sub { font-size: 0.72rem; color: var(--text-hint); margin-top: 2px; }
  .modal-input {
    width: 64px;
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    font-size: 0.92rem; text-align: center;
    font-family: inherit;
    background: var(--bg-sub); color: var(--text);
    outline: none;
  }
  .modal-input:focus { border-color: var(--brown); }
  .modal-unit { font-size: 0.78rem; color: var(--text-hint); }
  .modal-save {
    width: 100%; margin-top: 20px;
    background: var(--brown); color: white;
    border: none; border-radius: var(--radius-sm);
    padding: 14px; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; font-family: inherit; min-height: 50px;
  }
  .modal-save:active { background: #7a5234; }

  /* ── Care notes section ── */
  .care-notes-section {
    border-top: 0.5px solid var(--border);
    border-bottom: 0.5px solid var(--border);
    padding: 12px 16px 14px;
  }
  .care-notes-title {
    font-size: 0.75rem; font-weight: 600;
    color: var(--text-sec);
    margin-bottom: 10px;
    letter-spacing: 0.02em;
  }
  .care-notes-display {
    background: var(--bg-sub);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 0.88rem; color: var(--text);
    line-height: 1.6;
    min-height: 44px;
    cursor: pointer;
    transition: background 0.1s;
    white-space: pre-wrap;

<script>
const DAYS = ['일','월','화','수','목','금','토'];
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const now = new Date();
let vY = now.getFullYear(), vM = now.getMonth();
let sel = null, wxOpen = false, addOpen = false, editId = null;

window.db = {};
window.realWeatherCache = {};

const OWM_API_KEY = "0b67989641327075dd3d2ed04352bf9e";

function dk(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function normalizeTimeFormat(input) {
  if (!input) return '';
  let s = String(input).trim();

  // 9:5 -> 09:05 / 9:30 -> 09:30
  s = s.replace(/\b(\d{1,2}):(\d{1,2})\b/g, (_, h, m) => {
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  });

  // 9시 5분 -> 09:05
  s = s.replace(/\b(\d{1,2})시\s*(\d{1,2})분\b/g, (_, h, m) => {
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  });

  return s;
}


// 한국어 시간 표현 → 분 단위 숫자로 변환 (정렬용)
function parseTimeToMinutes(t) {
  if (!t) return 9999;
  const s = t.trim();
  // HH:MM 형식
  const hm = s.match(/^(\d{1,2}):(\d{1,2})/);
  if (hm) return parseInt(hm[1]) * 60 + parseInt(hm[2]);
  // 오전/오후 + 시 + 분
  const ko = s.match(/^(오전|오후|새벽|밤|저녁|아침|낮)?\s*(\d{1,2})시(?:\s*(\d{1,2})분)?/);
  if (ko) {
    let h = parseInt(ko[2]), min = parseInt(ko[3] || '0');
    const prefix = ko[1] || '';
    if (prefix === '오후' || prefix === '저녁' || prefix === '밤') { if (h !== 12) h += 12; }
    if (prefix === '오전' || prefix === '새벽' || prefix === '아침') { if (h === 12) h = 0; }
    if (prefix === '낮') { if (h < 12) h += 12; }
    return h * 60 + min;
  }
  // 숫자만 (예: "9", "10")
  const numOnly = s.match(/^(\d{1,2})$/);
  if (numOnly) return parseInt(numOnly[1]) * 60;
  // 텍스트 키워드 대략 매핑
  if (/새벽/.test(s)) return 3 * 60;
  if (/아침/.test(s)) return 7 * 60;
  if (/오전/.test(s)) return 9 * 60;
  if (/점심|낮/.test(s)) return 12 * 60;
  if (/오후/.test(s)) return 14 * 60;
  if (/저녁/.test(s)) return 18 * 60;
  if (/밤/.test(s)) return 21 * 60;
  return 9999;
}

function getEvs(key){ 
  if (!window.db[key]) return [];
  const evList = [];
  for (let id in window.db[key]) {
    if (id === '__care__') continue;
    evList.push({ _id: id, ...window.db[key][id] });
  }
  return evList.sort((a,b) => parseTimeToMinutes(a.time) - parseTimeToMinutes(b.time));
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const CLOSE_SVG = `<svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
const PLUS_SVG  = `<svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;

function mockWx(y,m,d){
  const s = y*10000+(m+1)*100+d;
  const r = (n)=>((s*1103515245+n*12345)&0x7fffffff)%100;
  const mo = m+1; let t, h, w;
  if(mo<=2||mo===12){t=-5+r(1)%15;h=30+r(2)%40;w=1+r(3)%6;}
  else if(mo<=4){t=5+r(1)%20;h=40+r(2)%35;w=1+r(3)%5;}
  else if(mo<=6){t=18+r(1)%15;h=55+r(2)%40;w=1+r(3)%4;}
  else if(mo<=8){t=26+r(1)%10;h=70+r(2)%25;w=1+r(3)%3;}
  else if(mo<=10){t=10+r(1)%18;h=45+r(2)%35;w=1+r(3)%5;}
  else{t=r(1)%12;h=35+r(2)%35;w=1+r(3)%6;}
  const cs=[['맑음','☀️',false],['구름 조금','⛅',false],['흐림','☁️',false],['비','🌧️',true],['맑음','☀️',false],['맑음','☀️',false]];
  const c = cs[r(4)%cs.length];
  return {temp:t, tempMin:t-3-r(6)%4, tempMax:t+3+r(7)%4, feels:t-2+r(5)%5, humid:h, wind:(1+r(3)%6).toFixed(1), cond:c[0], icon:c[1], rain:c[2]};
}

function mapWeatherIcon(iconCode) {
  if (!iconCode) return '☀️';
  if (iconCode.startsWith('01')) return '☀️';
  if (iconCode.startsWith('02')) return '⛅';
  if (iconCode.startsWith('03') || iconCode.startsWith('04')) return '☁️';
  if (iconCode.startsWith('09') || iconCode.startsWith('10')) return '🌧️';
  if (iconCode.startsWith('11')) return '⚡';
  if (iconCode.startsWith('13')) return '❄️';
  if (iconCode.startsWith('50')) return '🌫️';
  return '🌤️';
}

function translateCond(desc, main) {
  if (main === 'Clear') return '맑음';
  if (main === 'Clouds') {
    if (desc.includes('broken') || desc.includes('overcast')) return '흐림';
    return '구름 조금';
  }
  if (main === 'Rain' || main === 'Drizzle') return '비';
  if (main === 'Thunderstorm') return '뇌우';
  if (main === 'Snow') return '눈';
  return desc;
}

function suit(w){
  if(w.rain || w.cond.includes('비')) return {lbl:'비 ☂️',cls:'suit-rainy',desc:'우산 없이는 산책이 힘들어요. 짧게 다녀오거나 실내에서 놀아줘요!'};
  if(w.temp>=30) return {lbl:'너무 더워요 🥵',cls:'suit-hot',desc:'지면이 뜨거워 발바닥이 데일 수 있어요. 이른 아침이나 저녁에 짧게 다녀오세요!'};
  if(w.temp>=24) return {lbl:'조금 더운 날 🌤️',cls:'suit-hot',desc:'그늘 위주로 산책하고 물을 꼭 챙겨가세요.'};
  if(w.temp<=-5) return {lbl:'많이 추워요 🥶',cls:'suit-cold',desc:'강아지 옷을 입히고 짧게 다녀오세요. 발바닥 동상에 주의하세요!'};
  if(w.temp<=5)  return {lbl:'쌀쌀한 날 🧥',cls:'suit-cold',desc:'옷 챙겨 입히고 따뜻할 때 짧게 산책하는 게 좋아요.'};
  return {lbl:'산책 딱 좋아요 🐾',cls:'suit-perfect',desc:'초코가 신나게 뛰어다닐 수 있는 완벽한 날씨예요!'};
}

// ── 위치 권한 거부 안내 배너 ──
function showLocationDeniedBanner() {
  if (document.getElementById('loc-denied-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'loc-denied-banner';
  banner.style.cssText = [
    'background:#FFF3CD','color:#856404','font-size:0.78rem',
    'padding:10px 16px','text-align:center','line-height:1.6',
    'border-bottom:0.5px solid rgba(133,100,4,0.25)'
  ].join(';');
  banner.textContent = '📍 위치 권한이 꺼져 있어요. 브라우저 주소창의 🔒 아이콘을 눌러 위치를 허용하면 실제 날씨를 볼 수 있어요.';
  const app = document.getElementById('app');
  app.insertBefore(banner, app.children[1]);
}

// ── GPS 위치 → OWM 날씨 ──
function getWeather(onSuccess, onFail) {
  if (!navigator.geolocation) { onFail(); return; }
  navigator.geolocation.getCurrentPosition(
    function (position) {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      const url =
        "https://api.openweathermap.org/data/2.5/weather" +
        "?lat=" + lat + "&lon=" + lon +
        "&appid=" + OWM_API_KEY + "&units=metric&lang=kr";
      fetch(url)
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (!data || !data.main) { onFail(); return; }
          onSuccess({
            temp  : Math.round(data.main.temp),
            tempMin: Math.round(data.main.temp_min),
            tempMax: Math.round(data.main.temp_max),
            feels : Math.round(data.main.feels_like),
            humid : data.main.humidity,
            wind  : data.wind ? data.wind.speed.toFixed(1) : "0.0",
            cond  : translateCond(data.weather[0].description, data.weather[0].main),
            icon  : mapWeatherIcon(data.weather[0].icon),
            rain  : data.weather[0].main === 'Rain' || data.weather[0].main === 'Drizzle'
          });
        })
        .catch(function () { onFail(); });
    },
    function (err) {
      if (err.code === 1) showLocationDeniedBanner();
      else console.warn("위치 정보 오류 (code=" + err.code + ")");
      onFail();
    },
    { timeout: 8000 }
  );
}

// ── 페이지 로드 시 바로 날씨 요청 ──
(function () {
  const TODAY_KEY = dk(now.getFullYear(), now.getMonth(), now.getDate());
  getWeather(
    function (weatherObj) {
      window.realWeatherCache[TODAY_KEY] = weatherObj;
      if (sel && dk(sel.y, sel.m, sel.d) === TODAY_KEY) renderDetail();
    },
    function () {}
  );
})();

function fetchRealWeather(key, callback) {
  if (window.realWeatherCache[key]) {
    callback(window.realWeatherCache[key]);
    return;
  }
  getWeather(
    function (weatherObj) {
      window.realWeatherCache[key] = weatherObj;
      callback(weatherObj);
    },
    function () {
      callback(mockWx(sel.y, sel.m, sel.d));
    }
  );
}

window.renderCal = function(){
  document.getElementById('month-lbl').textContent = `${vY}년 ${MONTHS[vM]}`;
  const grid = document.getElementById('cal'); grid.innerHTML = '';
  DAYS.forEach((d,i)=>{
    const h = document.createElement('div');
    h.className = 'dh '+(i===0?'sun-h':i===6?'sat-h':'');
    h.textContent = d; grid.appendChild(h);
  });
  const first = new Date(vY,vM,1).getDay();
  const last  = new Date(vY,vM+1,0).getDate();
  for(let i=0;i<first;i++){ const e=document.createElement('div'); e.className='dc empty'; grid.appendChild(e); }
  for(let d=1;d<=last;d++){
    const key = dk(vY,vM,d);
    const evs = getEvs(key);
    const dow = (first+d-1)%7;
    const cell = document.createElement('div'); cell.className='dc';
    const isToday = d===now.getDate()&&vM===now.getMonth()&&vY===now.getFullYear();
    if(isToday) cell.classList.add('today');
    if(sel && dk(sel.y,sel.m,sel.d)===key) cell.classList.add('selected');
    const num = document.createElement('div');
    num.className = 'dn'+(dow===0?' sun':dow===6?' sat':'');
    num.textContent = d; cell.appendChild(num);
    if(evs.length>0){
      const dots = document.createElement('div'); dots.className='dots';
      [...Array(Math.min(evs.length,3))].forEach(()=>{ const dot=document.createElement('div'); dot.className='dot'; dots.appendChild(dot); });
      cell.appendChild(dots);
    }
    cell.addEventListener('click',()=>{ 
      sel={y:vY,m:vM,d}; wxOpen=false; addOpen=false; 
      renderCal(); 
      const targetKey = dk(vY,vM,d);
      const isSelectToday = d===now.getDate()&&vM===now.getMonth()&&vY===now.getFullYear();
      if (isSelectToday) {
        if (window.realWeatherCache[targetKey]) {
          renderDetail();
        } else {
          renderDetail({ loading: true });
          fetchRealWeather(targetKey, () => { renderDetail(); });
        }
      } else {
        renderDetail();
      }
    });
    grid.appendChild(cell);
  }
}

window.renderDetail = function(options){
  const area = document.getElementById('detail');
  if(!sel){ area.innerHTML=`<div class="no-sel"><div class="paw">🐾</div><p>날짜를 탭해서<br>초코의 하루를 기록해요!</p></div>`; return; }
  const {y,m,d} = sel;
  const key = dk(y,m,d);
  const evs = getEvs(key);
  const isSelectToday = d===now.getDate()&&m===now.getMonth()&&y===now.getFullYear();
  
  if (options && options.loading) {
    area.innerHTML = `<div class="panel" style="padding: 30px; text-align: center; color: var(--text-hint);">위치 날씨 정보를 읽어오는 중... 🌤️</div>`;
    return;
  }

  const w = (isSelectToday && window.realWeatherCache[key]) ? window.realWeatherCache[key] : mockWx(y,m,d);
  const s = suit(w);
  const dow = new Date(y,m,d).getDay();

  // Walk entries: array [{start, end}]
  const walkEntries = care.walkLog ? Object.entries(care.walkLog).sort((a,b)=>parseTimeToMinutes(a[1].start)-parseTimeToMinutes(b[1].start)).map(([id,v])=>({id,...v})) : [];
  // Poop entries: array [{time}]
  const poopEntries = care.poopLog ? Object.entries(care.poopLog).sort((a,b)=>parseTimeToMinutes(a[1].time)-parseTimeToMinutes(b[1].time)).map(([id,v])=>({id,...v})) : [];
  // Gum entries: array [{time}]
  const gumEntries = care.gumLog ? Object.entries(care.gumLog).sort((a,b)=>parseTimeToMinutes(a[1].time)-parseTimeToMinutes(b[1].time)).map(([id,v])=>({id,...v})) : [];
  // Notes
  const careNotes = care.notes || '';
  let notesEditOpen = window._notesEditOpen === key;

  function walkLogHTML(){

  function poopLogHTML(){

    return `<div class="tracker-log">${poopEntries.map((e,i)=>`
      <div class="tracker-log-item">
        <span class="tracker-log-num">${i+1}</span>
        <span class="tracker-log-times">${esc(e.time)}</span>
        <button class="tracker-log-edit" onclick="openTrackerEdit('${key}','poop','${e.id}','${esc(e.time)}','')">수정</button>
        <button class="tracker-log-del" onclick="deletePoopEntry('${key}','${e.id}')">✕</button>

  function gumLogHTML(){

    return `<div class="tracker-log">${gumEntries.map((e,i)=>`
      <div class="tracker-log-item">
        <span class="tracker-log-num">${i+1}</span>

        <button class="tracker-log-del" onclick="deleteGumEntry('${key}','${e.id}')">✕</button>
      </div>`).join('')}</div>`;
  }

  const notesHTML = notesEditOpen
    ? `<div class="care-notes-form">
        <textarea class="care-notes-textarea" id="care-notes-input" placeholder="토했거나 특이사항을 적어주세요">${esc(careNotes)}</textarea>

  const careHTML = `<div class="care-section">

    <div class="care-grid">

    <div class="care-notes-title">📝 기타 / 특이사항</div>

  let wxDetail = '';
  if(wxOpen){
    wxDetail = `<div class="wx-detail">
      <div class="wx-grid">
        <div class="wx-metric"><div class="wx-ml">체감온도</div><div class="wx-mv">${w.feels}°C</div></div>

      <div class="wx-advice">${s.desc}</div>
      <span class="suit-badge ${s.cls}">${s.lbl}</span>
    </div>`;
  }

  let addHTML = '';
  if(addOpen || editId){
    const isEdit = !!editId;
    const editEv = isEdit ? evs.find(e=>e._id===editId) : null;
    addHTML = `<div class="add-form">
      <label>시간</label>
      <input id="ev-time" type="text" inputmode="text" placeholder="예) 08:30 / 오전 9시 / 저녁" value="${isEdit?esc(editEv.time):''}" />
      <label>내용</label>

      <input id="ev-memo" type="text" placeholder="추가로 적고 싶은 내용" value="${isEdit&&editEv.memo?esc(editEv.memo):''}" />
      <div class="add-row-btns">
        <button class="btn-save" onclick="${isEdit?`doEdit('${key}','${editId}')`:`doAdd('${key}')`}">${isEdit?'저장':'추가'}</button>
        <button class="btn-cancel" onclick="${isEdit?'closeEdit()':'closeAdd()'}">취소</button>
      </div>

  area.innerHTML = `<div class="panel">

window.deleteEv = function(key, id){
  if(!window.fbDatabase) return;
  const itemRef = window.fbRef(window.fbDatabase, `diaries/${key}/${id}`);
  window.fbRemove(itemRef).catch(err => alert("삭제 실패: " + err.message));
};

window.doAdd = function(key){
  const time = normalizeTimeFormat((document.getElementById('ev-time').value||'').trim());
  const name = (document.getElementById('ev-name').value||'').trim();
  const memo = (document.getElementById('ev-memo').value||'').trim();
  if(!time){ alert('시간을 입력해주세요!'); return; }
  if(!name){ alert('내용을 입력해주세요!'); return; }
  if(!window.fbDatabase) { alert("서버 연결 중입니다. 잠시만 기다려주세요."); return; }

  const dayRef = window.fbRef(window.fbDatabase, `diaries/${key}`);
  const newEvRef = window.fbPush(dayRef);
  
  window.fbSet(newEvRef, { time, name, memo })
    .then(() => { addOpen = false; })
    .catch(err => alert("저장 실패: " + err.message));
};

window.saveTimeEntry = function(){
  const start = normalizeTimeFormat((document.getElementById('ti-start').value||'').trim());
  const end   = normalizeTimeFormat((document.getElementById('ti-end')  .value||'').trim());
  if(!start){ alert('시간을 입력해주세요!'); return; }
  if(!window.fbDatabase){ alert('서버 연결 중이에요. 잠시 후 다시 시도해주세요.'); return; }
  const key = _timeModalKey;
  if(_timeModalType === 'walk'){
    const logRef = window.fbRef(window.fbDatabase, `diaries/${key}/__care__/walkLog`);
    const newRef = window.fbPush(logRef);
    window.fbSet(newRef, { start, end: end||'' })
      .then(()=>{ document.getElementById('time-input-modal').style.display='none'; })
      .catch(err=>alert('저장 실패: '+err.message));
  } else if(_timeModalType === 'poop'){
    const logRef = window.fbRef(window.fbDatabase, `diaries/${key}/__care__/poopLog`);
    const newRef = window.fbPush(logRef);
    window.fbSet(newRef, { time: start })
      .then(()=>{ document.getElementById('time-input-modal').style.display='none'; })
      .catch(err=>alert('저장 실패: '+err.message));
  } else if(_timeModalType === 'gum'){
    const logRef = window.fbRef(window.fbDatabase, `diaries/${key}/__care__/gumLog`);
    const newRef = window.fbPush(logRef);
    window.fbSet(newRef, { time: start })
      .then(()=>{ document.getElementById('time-input-modal').style.display='none'; })
      .catch(err=>alert('저장 실패: '+err.message));
  }
};

const CHOCO_ALERT_SETTINGS_MY = 'choco_alert_settings';

function loadSettings() {
  try { return JSON.parse(localStorage.getItem(CHOCO_ALERT_SETTINGS_MY)) || {}; }
  catch(e) { return {}; }
}
function saveSettingsToStorage(obj) {
  localStorage.setItem(CHOCO_ALERT_SETTINGS_MY, JSON.stringify(obj));
}

window.openSettings = function() {
  const s = loadSettings();
  const inp = document.getElementById('groom-weeks');
  if (inp) inp.value = s.groomWeeks || 4;
  document.getElementById('settings-modal').style.display = 'flex';
};
window.closeSettings = function(e) {
  if (!e || e.target === document.getElementById('settings-modal'))
    document.getElementById('settings-modal').style.display = 'none';
};
window.saveSettings = function() {
  const weeks = parseInt(document.getElementById('groom-weeks').value) || 4;
  saveSettingsToStorage({ groomWeeks: weeks });
  document.getElementById('settings-modal').style.display = 'none';
  checkAlerts();
};

// 마지막으로 체크한 날짜 찾기
function findLastChecked(field) {
  const keys = Object.keys(window.db || {}).filter(k => k.match(/^\d{4}-\d{2}-\d{2}$/)).sort().reverse();
  for (const k of keys) {
    if (window.db[k]?.__care__?.[field]) return new Date(k + 'T00:00:00');
  }
  return null;
}

function diffDays(a, b) {
  return Math.floor((b - a) / (1000 * 60 * 60 * 24));
}

function checkAlerts() {
  const s = loadSettings();
  const groomWeeks = s.groomWeeks || 4;
  const today = new Date(); today.setHours(0,0,0,0);
  const banners = [];

  // 심장사상충: 마지막 체크 기준 매달 같은 날
  const lastHeart = findLastChecked('heart');
  if (lastHeart) {
    const next = new Date(lastHeart);
    next.setMonth(next.getMonth() + 1);
    const diff = diffDays(today, next);
    if (diff <= 0) {
      banners.push({ icon:'💊', title:'심장사상충 먹일 날이에요!', body: diff === 0 ? '오늘이 바로 그 날이에요 🐾' : `${Math.abs(diff)}일이 지났어요. 빨리 챙겨주세요!` });
    } else if (diff <= 3) {
      banners.push({ icon:'💊', title:`심장사상충 D-${diff}`, body: `${next.getMonth()+1}월 ${next.getDate()}일에 먹여야 해요.` });
    }
  }

  // 미용: 마지막 체크 기준 N주
  const lastGroom = findLastChecked('groom');
  if (lastGroom) {
    const next = new Date(lastGroom);
    next.setDate(next.getDate() + groomWeeks * 7);
    const diff = diffDays(today, next);
    if (diff <= 0) {
      banners.push({ icon:'✂️', title:'미용할 때가 됐어요!', body: diff === 0 ? '오늘 예약해보는 건 어때요? 🐶' : `${Math.abs(diff)}일이 지났어요!` });
    } else if (diff <= 5) {
      banners.push({ icon:'✂️', title:`미용 D-${diff}`, body: `${next.getMonth()+1}월 ${next.getDate()}일이 미용 예정일이에요.` });
    }
  }

  renderAlerts(banners);
}

function renderAlerts(banners) {
  const area = document.getElementById('alert-area');
  if (!banners.length) { area.innerHTML = ''; return; }
  area.innerHTML = banners.map((b, i) => `
    <div class="alert-banner" id="alert-${i}">
      <div class="alert-icon">${b.icon}</div>
      <div class="alert-text">
        <div class="alert-title">${b.title}</div>
        <div class="alert-body">${b.body}</div>
      </div>
      <button class="alert-close" onclick="document.getElementById('alert-${i}').remove()">✕</button>
    </div>`).join('');
}

// Firebase DB 로드 완료 후 알림 체크
window.__alertChecked = false;
const __origRenderCal = window.renderCal;
window.renderCal = function() {
  __origRenderCal();
  if (!window.__alertChecked && Object.keys(window.db || {}).length > 0) {
    window.__alertChecked = true;
    checkAlerts();
  }
};
</script>
